name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  check:
    name: Check
    uses: ./.github/workflows/check.yml
    permissions:
      contents: read

  validate:
    name: Validate release tag
    needs: check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      channel: ${{ steps.release.outputs.channel }}
      strategy: ${{ steps.release.outputs.strategy }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch refs
        run: git fetch --force --tags origin '+refs/heads/*:refs/remotes/origin/*'

      - name: Setup project
        uses: ./.github/actions/setup-project

      - name: Build CLI
        run: pnpm build

      - name: Validate release tag
        id: release
        run: node dist/cli.js validate --tag "$GITHUB_REF_NAME" --github-output

  npm:
    name: Publish to npm
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.validate.outputs.tag }}
          fetch-depth: 0

      - name: Setup project
        uses: ./.github/actions/setup-project

      - name: Set package version for publish
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
        run: pnpm version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version --ignore-scripts

      - name: Resolve npm dist-tag
        id: npm-tag
        env:
          RELEASE_CHANNEL: ${{ needs.validate.outputs.channel }}
          RELEASE_STRATEGY: ${{ needs.validate.outputs.strategy }}
        run: |
          if [[ "$RELEASE_STRATEGY" == "stable" ]]; then
            dist_tag="latest"
          else
            dist_tag="$RELEASE_CHANNEL"
          fi
          echo "tag=$dist_tag" >> "$GITHUB_OUTPUT"

      - name: Check npm package contents
        run: npm pack --dry-run

      - name: Publish package
        run: npm publish --registry https://registry.npmjs.org/ --access public --tag "${{ steps.npm-tag.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          NPM_TAG: ${{ steps.npm-tag.outputs.tag }}
          RELEASE_STRATEGY: ${{ needs.validate.outputs.strategy }}
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: |
          args=(--verify-tag --title "$RELEASE_TAG" --notes "Published to npm as tagsmith@$RELEASE_VERSION with dist-tag $NPM_TAG.")
          if [[ "$RELEASE_STRATEGY" != "stable" ]]; then
            args+=(--prerelease)
          fi

          gh release create "$RELEASE_TAG" "${args[@]}"
