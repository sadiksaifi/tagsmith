name: Docs drift guard

on:
  pull_request:
    paths:
      - "schema/v1.json"
      - "src/core/init/init-template.ts"
      - "src/core/config/config.ts"
      - "src/core/release/release.ts"
      - "src/cli/create-cli.ts"
      - "src/cli/commands/**"
      - "docs/docs/**"
      - "docs/index.md"

permissions:
  contents: read

concurrency:
  group: docs-drift-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  guard:
    name: Require docs source update on watched paths
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check for drift
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          watched_pattern='^(schema/v1\.json|src/core/init/init-template\.ts|src/core/config/config\.ts|src/core/release/release\.ts|src/cli/create-cli\.ts|src/cli/commands/.*)$'
          docs_pattern='^docs/(index\.md|docs/.*\.md)$'

          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")

          if ! echo "$changed" | grep -qE "$watched_pattern"; then
            echo "No watched paths changed. Drift guard skipped."
            exit 0
          fi

          if git log --format=%B "$BASE_SHA..$HEAD_SHA" | grep -qF "[skip-llms]"; then
            echo "Found [skip-llms] in a commit message. Drift guard skipped."
            exit 0
          fi

          if echo "$changed" | grep -qE "$docs_pattern"; then
            echo "Docs source updated alongside watched-path changes. Generated llms files will be rebuilt from docs source."
            exit 0
          fi

          echo "::error::A watched path changed without an accompanying docs source update."
          echo "Watched paths: schema/v1.json, src/core/init/init-template.ts, src/core/config/config.ts, src/core/release/release.ts, src/cli/create-cli.ts, src/cli/commands/**."
          echo "Update docs Markdown under docs/docs/** or docs/index.md so generated llms files stay in sync."
          echo "If this change does not affect agent-facing semantics, add [skip-llms] to a commit message."
          exit 1
