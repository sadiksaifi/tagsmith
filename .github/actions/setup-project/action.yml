name: Setup project
description: Install mise-managed tools, configure pnpm cache, and install dependencies.

runs:
  using: composite
  steps:
    - name: Set up mise tools
      uses: jdx/mise-action@v4
      with:
        version: 2026.5.0

    - name: Set up pnpm
      uses: pnpm/action-setup@v6
      with:
        cache: true
        cache_dependency_path: pnpm-lock.yaml

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
